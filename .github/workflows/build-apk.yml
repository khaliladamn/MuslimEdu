name: Build MuslimEdu APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your source files
        uses: actions/checkout@v4
        with:
          path: source-files

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create a fresh React Native project (generates android/ios folders)
        run: npx @react-native-community/cli@latest init MuslimEdu --package-name com.muslimeduu --skip-install

      - name: Copy your custom app code into the project
        run: |
          rm -rf MuslimEdu/App.tsx
          cp -r source-files/src MuslimEdu/src
          cp source-files/App.tsx MuslimEdu/App.tsx

      - name: Copy your app icon over the default one
        run: cp -r source-files/android-icons/* MuslimEdu/android/app/src/main/res/

      - name: Install dependencies
        working-directory: MuslimEdu
        run: |
          npm install
          npm install @react-navigation/native @react-navigation/native-stack react-native-screens react-native-safe-area-context react-native-keychain react-native-svg

      - name: Bundle JavaScript into the APK (so it works without Metro)
        working-directory: MuslimEdu
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build debug APK
        working-directory: MuslimEdu/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: muslimedu-debug-apk
          path: MuslimEdu/android/app/build/outputs/apk/debug/app-debug.apk
